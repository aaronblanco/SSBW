<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Detalle de producto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --ssbw-navy-900: #0a1f44;
        --ssbw-navy-800: #123162;
      }

      body {
        background: radial-gradient(circle at top left, #eef3ff, #f9fbff 45%, #eef2f8);
      }

      .ssbw-hero {
        background: linear-gradient(135deg, var(--ssbw-navy-900), var(--ssbw-navy-800));
        color: #fff;
        border-radius: 1rem;
      }

      .ssbw-image {
        width: 100%;
        max-height: 420px;
        object-fit: contain;
        background: #fff;
        border-radius: 0.75rem;
        padding: 0.75rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">SSBW · Productos Gatitos</a>
      </div>
    </nav>

    <main class="container py-4">
      <section class="p-4 mb-4 ssbw-hero">
        <h1 class="h3 mb-1">Detalle de producto</h1>
        <p class="mb-0 text-white-50" id="statusText">Cargando...</p>
        <span class="badge text-bg-light mt-2" id="cartCountBadge">Carrito: 0</span>
      </section>

      <section class="card shadow-sm border-0">
        <div class="card-body" id="detailContainer"></div>
      </section>
    </main>

    <script src="/cart.js"></script>
    <script src="/product.js"></script>
  </body>
</html>
