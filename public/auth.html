<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Acceso</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">SSBW · Productos Gatitos</a>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row justify-content-center">
        <section class="col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
              <h5 id="formTitle" class="mb-0">Inicio de sesion</h5>
              <div class="btn-group btn-group-sm" role="group">
                <button id="switchToLogin" type="button" class="btn btn-outline-light active">Entrar</button>
                <button id="switchToRegister" type="button" class="btn btn-outline-light">Registro</button>
              </div>
            </div>
            <div class="card-body">
              <form id="loginForm" class="row g-2">
                <div class="col-12">
                  <input class="form-control" type="email" name="email" placeholder="Correo electronico" required />
                </div>
                <div class="col-12">
                  <input class="form-control" type="password" name="password" placeholder="Contraseña" required />
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-success" type="submit">Entrar</button>
                </div>
              </form>

              <form id="registerForm" class="row g-2 d-none">
                <div class="col-md-6">
                  <input class="form-control" name="firstName" placeholder="Nombre" required />
                </div>
                <div class="col-md-6">
                  <input class="form-control" name="lastName" placeholder="Apellidos" required />
                </div>
                <div class="col-12">
                  <input class="form-control" type="date" name="birthDate" required />
                </div>
                <div class="col-12">
                  <input class="form-control" type="email" name="email" placeholder="Correo electronico" required />
                </div>
                <div class="col-12">
                  <input class="form-control" type="password" name="password" placeholder="Contraseña" required />
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-primary" type="submit">Crear cuenta</button>
                </div>
              </form>

              <hr class="my-3" />
              <p class="small text-muted mb-1">Credenciales admin demo:</p>
              <p class="small mb-0">email: admin@ssbw.local · password: Admin123!</p>
            </div>
          </div>
        </section>
      </div>

      <div id="statusBox" class="alert alert-info mt-3 mb-0">Completa el formulario para continuar.</div>
    </main>

    <script src="/auth-client.js"></script>
    <script src="/auth.js"></script>
  </body>
</html>
