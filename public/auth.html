<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Acceso</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">SSBW - MiauMarket</a>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row justify-content-center">
        <section class="col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
              <h5 id="formTitle" class="mb-0">Inicio de sesion</h5>
              <div class="btn-group btn-group-sm" role="group">
                <button id="switchToLogin" type="button" class="btn btn-outline-light active">Entrar</button>
                <button id="switchToRegister" type="button" class="btn btn-outline-light">Registro</button>
              </div>
            </div>
            <div class="card-body">
              <form id="loginForm" class="row g-2">
                <div class="col-12">
                  <label class="form-label mb-1" for="loginEmail">Correo electronico</label>
                  <input
                    id="loginEmail"
                    class="form-control"
                    type="email"
                    name="email"
                    placeholder="ejemplo@correo.com"
                    autocomplete="email"
                    inputmode="email"
                    autofocus
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label mb-1" for="loginPassword">Contrasena</label>
                  <div class="input-group">
                    <input
                      id="loginPassword"
                      class="form-control"
                      type="password"
                      name="password"
                      placeholder="Tu contrasena"
                      autocomplete="current-password"
                      required
                    />
                    <button class="btn btn-outline-secondary js-toggle-password" data-target="loginPassword" type="button">Ver</button>
                  </div>
                  <div id="loginPasswordHint" class="form-text text-danger d-none"></div>
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-success" type="submit">Entrar a mi cuenta</button>
                </div>
              </form>

              <form id="registerForm" class="row g-2 d-none">
                <div class="col-md-6">
                  <label class="form-label mb-1" for="registerFirstName">Nombre</label>
                  <input id="registerFirstName" class="form-control" name="firstName" placeholder="Ana" autocomplete="given-name" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label mb-1" for="registerLastName">Apellidos</label>
                  <input id="registerLastName" class="form-control" name="lastName" placeholder="Garcia" autocomplete="family-name" required />
                </div>
                <div class="col-12">
                  <label class="form-label mb-1" for="registerBirthDate">Fecha de nacimiento</label>
                  <input id="registerBirthDate" class="form-control" type="date" name="birthDate" title="Fecha de nacimiento" required />
                </div>
                <div class="col-12">
                  <label class="form-label mb-1" for="registerEmail">Correo electronico</label>
                  <input
                    id="registerEmail"
                    class="form-control"
                    type="email"
                    name="email"
                    placeholder="ana@correo.com"
                    autocomplete="email"
                    inputmode="email"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label mb-1" for="registerPassword">Contrasena</label>
                  <div class="input-group">
                    <input
                      id="registerPassword"
                      class="form-control"
                      type="password"
                      name="password"
                      placeholder="Minimo 8 caracteres"
                      autocomplete="new-password"
                      required
                    />
                    <button class="btn btn-outline-secondary js-toggle-password" data-target="registerPassword" type="button">Ver</button>
                  </div>
                  <div class="form-text">Debe incluir al menos 8 caracteres, una letra y un numero.</div>
                  <div id="registerPasswordHint" class="form-text text-danger d-none"></div>
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-primary" type="submit">Crear cuenta y continuar</button>
                </div>
              </form>

              <hr class="my-3" />
              <p class="small text-muted mb-1">Credenciales admin demo:</p>
              <p class="small mb-0">email: admin@ssbw.local · password: Admin123!</p>
            </div>
          </div>
        </section>
      </div>

      <div id="statusBox" class="alert alert-info mt-3 mb-0">Completa el formulario para continuar.</div>
    </main>

    <script src="/auth-client.js"></script>
    <script src="/auth.js"></script>
  </body>
</html>
