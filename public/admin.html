<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Admin productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="/">SSBW · Admin</a>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">Cerrar sesion</button>
      </div>
    </nav>

    <main class="container py-4">
      <section class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h1 class="h4">Gestion de productos</h1>
          <p class="text-muted mb-0" id="adminInfo">Validando sesion...</p>
        </div>
      </section>

      <section class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h2 class="h5">Crear producto</h2>
          <form id="createForm" class="row g-2">
            <div class="col-md-6"><input class="form-control" name="title" placeholder="Titulo" required /></div>
            <div class="col-md-6"><input class="form-control" name="url" placeholder="URL" required /></div>
            <div class="col-md-4"><input class="form-control" name="source" placeholder="Fuente" value="manual" /></div>
            <div class="col-md-4"><input class="form-control" name="rawPrice" placeholder="Precio visible" /></div>
            <div class="col-md-4"><input class="form-control" name="price" type="number" step="0.01" placeholder="Precio numerico" /></div>
            <div class="col-md-8"><input class="form-control" name="image" placeholder="Imagen URL" /></div>
            <div class="col-md-2"><input class="form-control" name="currency" value="EUR" /></div>
            <div class="col-md-2 d-grid"><button class="btn btn-primary" type="submit">Crear</button></div>
          </form>
        </div>
      </section>

      <section class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h5">Listado editable</h2>
          <div id="adminStatus" class="small text-muted mb-3">Cargando productos...</div>
          <div id="productsTable"></div>
        </div>
      </section>
    </main>

    <script src="/auth-client.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
