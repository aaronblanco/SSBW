<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Buscador de productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <span class="navbar-brand mb-0 h1">SSBW · Productos Gatitos</span>
      </div>
    </nav>

    <main class="container py-4">
      <section class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h1 class="h4 mb-3">Página de búsquedas</h1>
          <form id="searchForm" class="row g-2">
            <div class="col-md-8">
              <input
                id="searchInput"
                type="text"
                class="form-control"
                placeholder="Buscar por nombre o fuente (ej: orijen)"
              />
            </div>
            <div class="col-md-2 d-grid">
              <button class="btn btn-primary" type="submit">Buscar</button>
            </div>
            <div class="col-md-2 d-grid">
              <button id="scrapeBtn" class="btn btn-outline-dark" type="button">
                Re-scrapear
              </button>
            </div>
          </form>

          <div class="mt-3 d-flex gap-2 align-items-center">
            <span class="badge text-bg-secondary" id="totalBadge">Total: 0</span>
            <span class="badge text-bg-info" id="wsBadge">WS: conectando...</span>
            <span class="text-muted small" id="statusText">Listo para buscar</span>
          </div>
        </div>
      </section>

      <section id="results" class="row g-3"></section>

      <section class="d-flex justify-content-between align-items-center mt-4">
        <button id="prevBtn" class="btn btn-outline-secondary">Anterior</button>
        <span class="text-muted" id="pageInfo">Página 1</span>
        <button id="nextBtn" class="btn btn-outline-secondary">Siguiente</button>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
