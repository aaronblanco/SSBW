<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Buscador de productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --ssbw-navy-900: #0a1f44;
        --ssbw-navy-800: #123162;
        --ssbw-navy-100: #e7eefb;
      }

      body {
        background: linear-gradient(180deg, #f4f8ff 0%, #eef3fb 100%);
      }

      .ssbw-section {
        background: linear-gradient(135deg, var(--ssbw-navy-900), var(--ssbw-navy-800));
        color: #fff;
        border: 0;
      }

      .ssbw-section .text-muted {
        color: #d4e1ff !important;
      }

      .ssbw-section .form-control {
        border-color: #93a8d8;
      }

      .ssbw-pager {
        background: var(--ssbw-navy-100);
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1">SSBW - MiauMarket</span>
        <div class="d-flex gap-2 align-items-center">
          <span id="authBadge" class="badge text-bg-secondary">No autenticado</span>
          <a class="btn btn-sm btn-outline-light" href="/auth.html">Acceso</a>
          <a id="profileLink" class="btn btn-sm btn-outline-light d-none" href="/profile.html">Perfil</a>
          <a id="adminLink" class="btn btn-sm btn-warning d-none" href="/admin.html">Admin</a>
          <button id="logoutBtn" class="btn btn-sm btn-light d-none" type="button">Salir</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <section class="card shadow-sm border-0 mb-4 ssbw-section">
        <div class="card-body">
          <h1 class="h4 mb-3">Página de búsquedas</h1>
          <form id="searchForm" class="row g-2">
            <div class="col-md-8">
              <input
                id="searchInput"
                type="text"
                class="form-control"
                placeholder="Buscar por nombre"
              />
            </div>
            <div class="col-md-2 d-grid">
              <button class="btn btn-primary" type="submit">Buscar</button>
            </div>
            <div class="col-md-2 d-grid">
              <button id="scrapeBtn" class="btn btn-outline-dark" type="button">
                Re-scrapear
              </button>
            </div>
          </form>

          <div class="mt-3 d-flex gap-2 align-items-center">
            <span class="badge text-bg-secondary" id="totalBadge">Total: 0</span>
            <span class="badge text-bg-info" id="wsBadge">WS: conectando...</span>
            <span class="text-muted small" id="statusText">Listo para buscar</span>
          </div>
        </div>
      </section>

      <section id="results" class="row g-3"></section>

      <section class="card shadow-sm border-0 mt-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Carrito</h2>
            <span class="badge text-bg-primary" id="cartCountBadge">0 productos</span>
          </div>
          <div id="cartItems" class="mb-3 text-muted small">El carrito esta vacio.</div>
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <button id="checkoutBtn" class="btn btn-success btn-sm" type="button">Finalizar compra</button>
            <button id="clearCartBtn" class="btn btn-outline-danger btn-sm" type="button">Vaciar carrito</button>
            <span id="cartTotalText" class="text-muted">Total estimado: 0.00 EUR</span>
          </div>
        </div>
      </section>

      <section class="d-flex justify-content-between align-items-center mt-4 ssbw-pager">
        <button id="prevBtn" class="btn btn-outline-secondary">Anterior</button>
        <span class="text-muted" id="pageInfo">Página 1</span>
        <button id="nextBtn" class="btn btn-outline-secondary">Siguiente</button>
      </section>
    </main>

    <script src="/auth-client.js"></script>
    <script src="/cart.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
