<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSBW | Perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="/">SSBW - MiauMarket</a>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">Cerrar sesion</button>
      </div>
    </nav>

    <main class="container py-4">
      <section class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h1 class="h4">Mi perfil</h1>
          <p class="text-muted mb-0" id="profileText">Cargando...</p>
        </div>
      </section>

      <section class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h5">Pedidos</h2>
          <div id="ordersBox" class="text-muted">Cargando pedidos...</div>
        </div>
      </section>
    </main>

    <script src="/auth-client.js"></script>
    <script src="/profile.js"></script>
  </body>
</html>
