services:
  postgres:
    image: postgres:16-alpine
    container_name: ssbw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssbw
      POSTGRES_USER: ssbw
      POSTGRES_PASSWORD: ssbw
    ports:
      - "5433:5432"
    volumes:
      - ssbw_postgres_data:/var/lib/postgresql/data

volumes:
  ssbw_postgres_data:
